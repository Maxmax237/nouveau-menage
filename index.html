<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenagePro - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-home { text-align: center; margin-bottom: 20px; }
        .back-home a { color: #667eea; text-decoration: none; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="back-home"><a href="../index.html">← Accueil</a></div>
        <h1>🔐 Admin</h1>
        <div class="subtitle">Accès réservé aux administrateurs</div>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" id="password" required></div>
            <button type="submit">Se connecter</button>
        </form>
        <div id="message" class="message"></div>
        <div class="register-link"><a href="register.html">Créer un compte administrateur</a></div>
        <div class="info">🔐 Compte par défaut : admin@menagepro.com / admin123</div>
    </div>
    <script>
        function initDefaultAdmin() {
            let admins = JSON.parse(localStorage.getItem('menagepro_admins') || '[]');
            if (admins.length === 0) {
                admins.push({ id: 1, fullName: "Super Admin", email: "admin@menagepro.com", password: "admin123", role: "super_admin", status: "active", createdAt: new Date().toISOString() });
                localStorage.setItem('menagepro_admins', JSON.stringify(admins));
            }
        }
        initDefaultAdmin();
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            let admins = JSON.parse(localStorage.getItem('menagepro_admins') || '[]');
            const admin = admins.find(a => a.email === email && a.password === password);
            if (admin) {
                sessionStorage.setItem('menagepro_current_admin', JSON.stringify(admin));
                document.getElementById('message').className = 'message success';
                document.getElementById('message').style.display = 'block';
                document.getElementById('message').textContent = '✅ Connexion réussie !';
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                document.getElementById('message').className = 'message error';
                document.getElementById('message').style.display = 'block';
                document.getElementById('message').textContent = '❌ Email ou mot de passe incorrect';
            }
        });
        if (sessionStorage.getItem('menagepro_current_admin')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
