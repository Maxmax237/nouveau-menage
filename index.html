<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MenagePro - Administration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- En-tête -->
        <header class="admin-header">
            <h1><i class="fas fa-broom"></i> MenagePro - Administration</h1>
            <div class="admin-actions">
                <span id="userEmail" class="user-email"></span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </div>
        </header>

        <!-- Statistiques rapides -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-info">
                    <span class="stat-value" id="totalWomen">0</span>
                    <span class="stat-label">Femmes inscrites</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-city"></i>
                <div class="stat-info">
                    <span class="stat-value" id="totalCities">0</span>
                    <span class="stat-label">Villes couvertes</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-week"></i>
                <div class="stat-info">
                    <span class="stat-value" id="newThisWeek">0</span>
                    <span class="stat-label">Nouveautés (7j)</span>
                </div>
            </div>
        </div>

        <!-- Barre de filtres et actions -->
        <div class="filters-bar">
            <div class="filters-group">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher (nom, ville, téléphone)" class="filter-input">
                <select id="cityFilter" class="filter-select">
                    <option value="">Toutes les villes</option>
                </select>
                <select id="statusFilter" class="filter-select">
                    <option value="">Tous les statuts</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="actions-group">
                <button id="exportCsvBtn" class="btn-export"><i class="fas fa-download"></i> Export CSV</button>
                <button id="refreshBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
            </div>
        </div>

        <!-- Tableau des inscrites -->
        <div class="table-container">
            <table class="admin-table" id="womenTable">
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Nom complet</th>
                        <th>Âge</th>
                        <th>Téléphone</th>
                        <th>Ville</th>
                        <th>Expérience</th>
                        <th>Statut</th>
                        <th>Date inscription</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="9" class="loading-row">
                            <i class="fas fa-spinner fa-spin"></i> Chargement...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button id="prevPage" disabled><i class="fas fa-chevron-left"></i> Précédent</button>
            <span id="pageInfo">Page 1 / 1</span>
            <button id="nextPage" disabled>Suivant <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Modal Modification -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Modifier une inscrite</h2>
                <span class="close">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <label>Nom complet :</label>
                <input type="text" id="editName" required>
                
                <label>Âge :</label>
                <input type="number" id="editAge" min="23" max="60" required>
                
                <label>Téléphone :</label>
                <input type="tel" id="editPhone" required>
                
                <label>Ville :</label>
                <input type="text" id="editCity" required>
                
                <label>Expérience (années) :</label>
                <input type="number" id="editExperience" min="0" step="0.5">
                
                <label>Statut :</label>
                <select id="editStatus">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                
                <div class="modal-buttons">
                    <button type="submit" class="btn-save">💾 Enregistrer</button>
                    <button type="button" class="btn-cancel">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
