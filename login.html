<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenagePro - Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-container button:hover {
            background: #5a67d8;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .demo-badge {
            background: #fef3c7;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 MenagePro Admin</h1>
        
        <div class="demo-badge">
            ⚡ Mode Démo Actif (sans Firebase Auth)
        </div>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email admin" value="admin@menagepro.com" required>
            <input type="password" id="password" placeholder="Mot de passe" value="admin123" required>
            <button type="submit">Se connecter</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            🔐 Compte démo : admin@menagepro.com / admin123<br>
            ⚡ Connexion en local uniquement
        </div>
    </div>

    <script type="module">
        // Configuration Firebase (pour Firestore seulement, pas Auth)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // TA configuration Firebase (à remplacer)
        const firebaseConfig = {
            apiKey: "TA_CLE_API",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET_ID",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "TON_SENDER_ID",
            appId: "TON_APP_ID"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Stocker db globalement pour admin.js
        window.db = db;
        
        // LOGIN SANS FIREBASE AUTH (mode démo)
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            // Identifiants par défaut
            if (email === 'admin@menagepro.com' && password === 'admin123') {
                // Stocker dans sessionStorage pour admin.js
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                sessionStorage.setItem('adminEmail', email);
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = '❌ Email ou mot de passe incorrect';
            }
        });
    </script>
</body>
</html>
