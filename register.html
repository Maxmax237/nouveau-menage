<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenagePro - Inscription Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .back-home {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-home a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .error {
            background: #fee;
            color: #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="back-home">
            <a href="index.html">← Retour à l'accueil</a>
        </div>
        
        <h1>📝 Créer un compte Admin</h1>
        <div class="subtitle">Seuls les super admins peuvent créer des comptes</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="fullName" placeholder="Jean Dupont" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@exemple.com" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="Au moins 6 caractères" required>
            </div>

            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="Retapez votre mot de passe" required>
            </div>

            <div class="form-group">
                <label>Rôle</label>
                <select id="role">
                    <option value="admin">Administrateur</option>
                    <option value="super_admin">Super Administrateur</option>
                </select>
            </div>

            <button type="submit">Créer mon compte</button>
        </form>

        <div id="message" class="message"></div>

        <div class="login-link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        // Vérifier si l'utilisateur connecté est super admin
        function isSuperAdmin() {
            const currentAdmin = sessionStorage.getItem('menagepro_current_admin');
            if (!currentAdmin) return false;
            const admin = JSON.parse(currentAdmin);
            return admin.role === 'super_admin';
        }

        // Si pas de super admin, permettre la création du premier compte
        function canCreateAdmin() {
            let admins = JSON.parse(localStorage.getItem('menagepro_admins') || '[]');
            // Si aucun admin n'existe, tout le monde peut créer le premier compte
            if (admins.length === 0) return true;
            // Sinon, seul un super admin connecté peut créer
            return isSuperAdmin();
        }

        // Rediriger si pas autorisé
        if (!canCreateAdmin()) {
            alert("⚠️ Seuls les Super Administrateurs peuvent créer de nouveaux comptes admin.");
            window.location.href = 'login.html';
        }

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            
            const messageDiv = document.getElementById('message');
            
            // Validations
            if (!fullName || !email || !password) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return;
            }
            
            // Récupérer les admins existants
            let admins = JSON.parse(localStorage.getItem('menagepro_admins') || '[]');
            
            // Vérifier si l'email existe déjà
            if (admins.some(admin => admin.email === email)) {
                showMessage('Cet email est déjà utilisé', 'error');
                return;
            }
            
            // Créer le nouvel administrateur
            const newAdmin = {
                id: Date.now(),
                fullName: fullName,
                email: email,
                password: password,
                role: role,
                status: 'active',
                createdAt: new Date().toISOString()
            };
            
            // Ajouter à la liste
            admins.push(newAdmin);
            localStorage.setItem('menagepro_admins', JSON.stringify(admins));
            
            showMessage('✅ Compte admin créé avec succès !', 'success');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
