<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenagePro - Créer compte Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-home { text-align: center; margin-bottom: 20px; }
        .back-home a { color: #667eea; text-decoration: none; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="back-home"><a href="../index.html">← Accueil</a></div>
        <h1>📝 Créer compte Admin</h1>
        <div class="subtitle">Inscription réservée aux administrateurs</div>
        <form id="registerForm">
            <div class="form-group"><label>Nom complet</label><input type="text" id="fullName" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" id="password" required></div>
            <div class="form-group"><label>Confirmer</label><input type="password" id="confirmPassword" required></div>
            <button type="submit">Créer mon compte</button>
        </form>
        <div id="message" class="message"></div>
        <div class="login-link"><a href="login.html">Déjà inscrit ? Se connecter</a></div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!fullName || !email || !password) return showMessage('Tous les champs sont requis', 'error');
            if (password !== confirm) return showMessage('Les mots de passe ne correspondent pas', 'error');
            if (password.length < 6) return showMessage('6 caractères minimum', 'error');
            let admins = JSON.parse(localStorage.getItem('menagepro_admins') || '[]');
            if (admins.some(a => a.email === email)) return showMessage('Email déjà utilisé', 'error');
            const role = admins.length === 0 ? 'super_admin' : 'admin';
            admins.push({ id: Date.now(), fullName, email, password, role, status: 'active', createdAt: new Date().toISOString() });
            localStorage.setItem('menagepro_admins', JSON.stringify(admins));
            showMessage('✅ Compte créé ! Redirection...', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        });
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
