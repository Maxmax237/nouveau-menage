<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenagePro - Devenir Femme de Ménage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-card {
            <div style="margin-bottom: 20px;">
    <a href="index.html" style="color: #667eea; text-decoration: none;">← Retour à l'accueil</a>
</div>
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input {
            width: auto;
            margin: 0;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: normal;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .rating {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .star {
            font-size: 24px;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }

        .star.selected {
            color: #ffc107;
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 25px;
            }
            
            .checkbox-group {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>🧹 Devenir Femme de Ménage</h1>
            <div class="subtitle">Rejoignez l'équipe MenagePro et trouvez des missions près de chez vous</div>

            <form id="registerMamanForm">
                <div class="form-section">
                    <h3>📝 Informations personnelles</h3>
                    <div class="form-group">
                        <label>Nom complet *</label>
                        <input type="text" id="fullName" required placeholder="Votre nom et prénom">
                    </div>

                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required placeholder="exemple@email.com">
                    </div>

                    <div class="form-group">
                        <label>Téléphone *</label>
                        <input type="tel" id="phone" required placeholder="06 12 34 56 78">
                    </div>

                    <div class="form-group">
                        <label>Mot de passe *</label>
                        <input type="password" id="password" required placeholder="Au moins 6 caractères">
                    </div>

                    <div class="form-group">
                        <label>Confirmer le mot de passe *</label>
                        <input type="password" id="confirmPassword" required placeholder="Retapez votre mot de passe">
                    </div>
                </div>

                <div class="form-section">
                    <h3>📍 Localisation</h3>
                    <div class="form-group">
                        <label>Ville *</label>
                        <input type="text" id="city" required placeholder="Ex: Paris, Lyon, Marseille...">
                    </div>

                    <div class="form-group">
                        <label>Code postal *</label>
                        <input type="text" id="postalCode" required placeholder="75001">
                    </div>

                    <div class="form-group">
                        <label>Adresse complète</label>
                        <textarea id="address" placeholder="Votre adresse complète"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3>🕐 Disponibilités</h3>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" value="Lundi"> <label>Lundi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Mardi"> <label>Mardi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Mercredi"> <label>Mercredi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Jeudi"> <label>Jeudi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Vendredi"> <label>Vendredi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Samedi"> <label>Samedi</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" value="Dimanche"> <label>Dimanche</label>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 15px;">
                        <label>Plages horaires disponibles</label>
                        <select id="timeSlot">
                            <option value="Matin (8h-12h)">Matin (8h-12h)</option>
                            <option value="Après-midi (13h-17h)">Après-midi (13h-17h)</option>
                            <option value="Soirée (18h-22h)">Soirée (18h-22h)</option>
                            <option value="Flexible">Flexible</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3>⭐ Expérience et compétences</h3>
                    <div class="form-group">
                        <label>Années d'expérience *</label>
                        <select id="experience">
                            <option value="0-1 an">0-1 an</option>
                            <option value="1-3 ans">1-3 ans</option>
                            <option value="3-5 ans">3-5 ans</option>
                            <option value="5-10 ans">5-10 ans</option>
                            <option value="10+ ans">10+ ans</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Compétences (sélectionnez plusieurs)</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" value="Nettoyage standard"> <label>Nettoyage standard</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" value="Repassage"> <label>Repassage</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" value="Cuisine"> <label>Cuisine</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" value="Nettoyage vitres"> <label>Nettoyage vitres</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" value="Ménage de printemps"> <label>Ménage de printemps</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" value="Garde d'enfants"> <label>Garde d'enfants</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Présentation / Motivation</label>
                        <textarea id="bio" placeholder="Parlez-nous de vous, de votre motivation et de votre parcours..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3>💰 Tarifs</h3>
                    <div class="form-group">
                        <label>Taux horaire souhaité (€/h) *</label>
                        <input type="number" id="hourlyRate" step="0.5" required placeholder="Ex: 12.50">
                    </div>
                </div>

                <div class="form-section">
                    <div class="checkbox-item">
                        <input type="checkbox" id="terms" required>
                        <label>J'accepte les conditions d'utilisation et je certifie que les informations fournies sont exactes *</label>
                    </div>
                </div>

                <button type="submit">📝 Postuler maintenant</button>
            </form>

            <div id="message" class="message"></div>

            <div class="login-link">
                Vous avez déjà un compte ? <a href="login-maman.html">Se connecter</a><br>
                <small style="color: #999;">👋 Pour les administrateurs : <a href="login.html">connexion admin</a></small>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerMamanForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Récupérer les valeurs
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const city = document.getElementById('city').value.trim();
            const postalCode = document.getElementById('postalCode').value.trim();
            const address = document.getElementById('address').value.trim();
            const experience = document.getElementById('experience').value;
            const hourlyRate = document.getElementById('hourlyRate').value;
            const bio = document.getElementById('bio').value.trim();
            const timeSlot = document.getElementById('timeSlot').value;
            const terms = document.getElementById('terms').checked;
            
            // Récupérer les disponibilités
            const disponibilites = [];
            document.querySelectorAll('#registerMamanForm .checkbox-group .checkbox-item input[type="checkbox"]').forEach(cb => {
                if (cb.checked && cb.value !== 'on') {
                    disponibilites.push(cb.value);
                }
            });
            
            // Récupérer les compétences
            const competences = [];
            document.querySelectorAll('.form-section .checkbox-group .checkbox-item input[type="checkbox"]').forEach(cb => {
                if (cb.checked && cb.parentElement.parentElement.parentElement.querySelector('label')?.innerText !== 'Compétences (sélectionnez plusieurs)') {
                    if (cb.value && cb.value !== 'on' && !disponibilites.includes(cb.value)) {
                        competences.push(cb.value);
                    }
                }
            });
            
            // Validation
            if (!fullName || !email || !phone || !password || !city || !postalCode || !hourlyRate) {
                showMessage('Veuillez remplir tous les champs obligatoires (*)', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return;
            }
            
            if (!terms) {
                showMessage('Vous devez accepter les conditions d\'utilisation', 'error');
                return;
            }
            
            // Vérifier si l'email existe déjà
            let mamans = JSON.parse(localStorage.getItem('menagepro_mamans') || '[]');
            if (mamans.some(m => m.email === email)) {
                showMessage('Cet email est déjà utilisé. Veuillez vous connecter.', 'error');
                return;
            }
            
            // Créer le profil de la maman
            const newMaman = {
                id: Date.now(),
                fullName: fullName,
                email: email,
                phone: phone,
                password: password,
                city: city,
                postalCode: postalCode,
                address: address,
                disponibilites: disponibilites,
                timeSlot: timeSlot,
                experience: experience,
                competences: competences,
                hourlyRate: parseFloat(hourlyRate),
                bio: bio,
                status: 'en_attente', // en_attente, approuvee, refusee
                createdAt: new Date().toISOString(),
                notes: '',
                rating: 0,
                missionsCompleted: 0
            };
            
            // Sauvegarder
            mamans.push(newMaman);
            localStorage.setItem('menagepro_mamans', JSON.stringify(mamans));
            
            // Connecter automatiquement
            sessionStorage.setItem('menagepro_current_maman', JSON.stringify({
                id: newMaman.id,
                fullName: newMaman.fullName,
                email: newMaman.email,
                status: newMaman.status
            }));
            
            showMessage('✅ Inscription réussie ! Votre dossier est en cours d\'examen. Redirection...', 'success');
            
            setTimeout(() => {
                window.location.href = 'dashboard-maman.html';
            }, 2000);
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 4000);
        }
        
        // Vérifier si déjà connecté
        const currentMaman = sessionStorage.getItem('menagepro_current_maman');
        if (currentMaman) {
            window.location.href = 'dashboard-maman.html';
        }
    </script>
</body>
</html>
