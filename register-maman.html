<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devenir Femme de Ménage - MenagePro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', sans-serif;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-home { text-align: center; margin-bottom: 20px; }
        .back-home a { color: #f5576c; text-decoration: none; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .form-section h3 { color: #f5576c; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #f5576c; }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; }
        .checkbox-item input { width: auto; margin: 0; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #f5576c; text-decoration: none; font-weight: 600; }
        @media (max-width: 768px) { .form-card { padding: 25px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="back-home"><a href="../index.html">← Accueil</a></div>
            <h1>🧹 Devenir Femme de Ménage</h1>
            <div class="subtitle">Inscrivez-vous et rejoignez notre équipe</div>

            <form id="registerForm">
                <div class="form-section">
                    <h3>📝 Informations personnelles</h3>
                    <div class="form-group"><label>Nom complet *</label><input type="text" id="fullName" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Téléphone *</label><input type="tel" id="phone" required></div>
                    <div class="form-group"><label>Mot de passe *</label><input type="password" id="password" required></div>
                    <div class="form-group"><label>Confirmer *</label><input type="password" id="confirmPassword" required></div>
                </div>

                <div class="form-section">
                    <h3>📍 Localisation</h3>
                    <div class="form-group"><label>Ville *</label><input type="text" id="city" required></div>
                    <div class="form-group"><label>Code postal *</label><input type="text" id="postalCode" required></div>
                    <div class="form-group"><label>Adresse</label><textarea id="address" rows="2"></textarea></div>
                </div>

                <div class="form-section">
                    <h3>🕐 Disponibilités</h3>
                    <div class="checkbox-group" id="dispoGroup">
                        <div class="checkbox-item"><input type="checkbox" value="Lundi"> <label>Lundi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Mardi"> <label>Mardi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Mercredi"> <label>Mercredi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Jeudi"> <label>Jeudi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Vendredi"> <label>Vendredi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Samedi"> <label>Samedi</label></div>
                        <div class="checkbox-item"><input type="checkbox" value="Dimanche"> <label>Dimanche</label></div>
                    </div>
                    <div class="form-group"><label>Plage horaire</label><select id="timeSlot"><option>Matin (8h-12h)</option><option>Après-midi (13h-17h)</option><option>Soirée (18h-22h)</option><option>Flexible</option></select></div>
                </div>

                <div class="form-section">
                    <h3>⭐ Expérience</h3>
                    <div class="form-group"><label>Années d'expérience</label><select id="experience"><option>0-1 an</option><option>1-3 ans</option><option>3-5 ans</option><option>5-10 ans</option><option>10+ ans</option></select></div>
                    <div class="form-group"><label>Compétences</label><div class="checkbox-group" id="skillsGroup"><div class="checkbox-item"><input type="checkbox" value="Nettoyage standard"> <label>Nettoyage standard</label></div><div class="checkbox-item"><input type="checkbox" value="Repassage"> <label>Repassage</label></div><div class="checkbox-item"><input type="checkbox" value="Cuisine"> <label>Cuisine</label></div><div class="checkbox-item"><input type="checkbox" value="Nettoyage vitres"> <label>Nettoyage vitres</label></div></div></div>
                    <div class="form-group"><label>Présentation</label><textarea id="bio" rows="3" placeholder="Parlez-nous de vous..."></textarea></div>
                </div>

                <div class="form-section">
                    <h3>💰 Tarif</h3>
                    <div class="form-group"><label>Taux horaire (€/h) *</label><input type="number" id="hourlyRate" step="0.5" required></div>
                </div>

                <div class="form-section">
                    <div class="checkbox-item"><input type="checkbox" id="terms" required> <label>J'accepte les conditions d'utilisation *</label></div>
                </div>

                <button type="submit">📝 Envoyer ma candidature</button>
            </form>

            <div id="message" class="message"></div>
            <div class="login-link">Déjà inscrite ? <a href="login.html">Se connecter</a></div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const city = document.getElementById('city').value.trim();
            const postalCode = document.getElementById('postalCode').value.trim();
            const hourlyRate = document.getElementById('hourlyRate').value;
            const terms = document.getElementById('terms').checked;

            if (!fullName || !email || !phone || !password || !city || !postalCode || !hourlyRate) {
                return showMessage('Tous les champs * sont requis', 'error');
            }
            if (password !== confirm) return showMessage('Les mots de passe ne correspondent pas', 'error');
            if (password.length < 6) return showMessage('6 caractères minimum', 'error');
            if (!terms) return showMessage('Acceptez les conditions', 'error');

            let disponibilites = [];
            document.querySelectorAll('#dispoGroup input:checked').forEach(cb => disponibilites.push(cb.value));

            let competences = [];
            document.querySelectorAll('#skillsGroup input:checked').forEach(cb => competences.push(cb.value));

            let mamans = JSON.parse(localStorage.getItem('menagepro_mamans') || '[]');
            if (mamans.some(m => m.email === email)) return showMessage('Cet email est déjà utilisé', 'error');

            const newMaman = {
                id: Date.now(),
                fullName, email, phone, password,
                city, postalCode, address: document.getElementById('address').value,
                disponibilites, timeSlot: document.getElementById('timeSlot').value,
                experience: document.getElementById('experience').value,
                competences, bio: document.getElementById('bio').value,
                hourlyRate: parseFloat(hourlyRate),
                status: 'en_attente',
                createdAt: new Date().toISOString(),
                missionsCompleted: 0, rating: 0
            };

            mamans.push(newMaman);
            localStorage.setItem('menagepro_mamans', JSON.stringify(mamans));

            // Connexion automatique
            sessionStorage.setItem('menagepro_current_maman', JSON.stringify({
                id: newMaman.id, fullName: newMaman.fullName, email: newMaman.email, status: newMaman.status
            }));

            showMessage('✅ Inscription réussie ! Votre dossier va être examiné.', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 2000);
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        }

        if (sessionStorage.getItem('menagepro_current_maman')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
