<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MenagePro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-home { text-align: center; margin-bottom: 20px; }
        .back-home a { color: #f5576c; text-decoration: none; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #f5576c; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
        .error { background: #fee; color: #c33; }
        .success { background: #efe; color: #3c3; }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #f5576c; text-decoration: none; font-weight: 600; }
        .info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="back-home"><a href="../index.html">← Accueil</a></div>
        <h1>🔐 Espace Candidat</h1>
        <div class="subtitle">Connectez-vous à votre compte</div>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Mot de passe</label><input type="password" id="password" required></div>
            <button type="submit">Se connecter</button>
        </form>
        <div id="message" class="message"></div>
        <div class="register-link"><a href="register.html">Pas encore inscrite ? Postuler maintenant</a></div>
        <div class="info">📝 Après inscription, votre dossier sera examiné par notre équipe</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            let mamans = JSON.parse(localStorage.getItem('menagepro_mamans') || '[]');
            const maman = mamans.find(m => m.email === email && m.password === password);
            if (maman) {
                if (maman.status === 'refusee') {
                    return showMessage('❌ Votre candidature a été refusée', 'error');
                }
                sessionStorage.setItem('menagepro_current_maman', JSON.stringify(maman));
                showMessage('✅ Connexion réussie !', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                showMessage('❌ Email ou mot de passe incorrect', 'error');
            }
        });
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        if (sessionStorage.getItem('menagepro_current_maman')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
